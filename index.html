<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Woontegra Teknoloji Yazılım ve Dijital Hizmetler Ltd. Şti.; işletmeler için özel yazılım, e-ticaret altyapısı, web sitesi, masaüstü yazılım ve dijital dönüşüm çözümleri geliştirir." />
    <link rel="canonical" href="https://www.woontegra.com/" />
    <title>Woontegra | Yazılım, E-Ticaret ve Dijital Dönüşüm Çözümleri</title>
    <script>
      ;(function () {
        var KEY = 'woontegra_chunk_reload_attempted'
        var PARAMS = ['__v', '__reload', '__recovery', '_fresh', 'fresh']

        function bustOnce() {
          try {
            if (sessionStorage.getItem(KEY) === '1') return false
            sessionStorage.setItem(KEY, '1')
            var url = new URL(window.location.href)
            for (var i = 0; i < PARAMS.length; i++) url.searchParams.delete(PARAMS[i])
            url.searchParams.set('__v', String(Date.now()))
            window.location.replace(url.toString())
            return true
          } catch (e) {
            return false
          }
        }

        function isAssetUrl(url) {
          return /\/assets\/[^/?#]+\.(js|css)/i.test(url || '')
        }

        window.addEventListener(
          'error',
          function (event) {
            var target = event.target
            if (!target) return
            var url = ''
            if (target.tagName === 'SCRIPT') url = target.src || ''
            else if (target.tagName === 'LINK') url = target.href || ''
            if (isAssetUrl(url)) bustOnce()
          },
          true,
        )
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      setTimeout(function () {
        if (window.__woontegraAppMounted) return
        var root = document.getElementById('root')
        if (!root || root.childElementCount > 0) return
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8fafc;padding:24px;font-family:system-ui,sans-serif;">' +
          '<div style="max-width:28rem;text-align:center;">' +
          '<h1 style="margin:0;font-size:1.125rem;font-weight:700;color:#0f172a;">Site yüklenirken hata oluştu</h1>' +
          '<p style="margin:12px 0 0;font-size:.875rem;color:#475569;">Lütfen sayfayı yenileyin. Sorun devam ederse tarayıcı önbelleğini temizleyin.</p>' +
          '<button type="button" onclick="window.location.reload()" style="margin-top:20px;border:0;border-radius:8px;background:#059669;color:#fff;padding:10px 16px;font-size:.875rem;cursor:pointer;">Sayfayı yenile</button>' +
          '</div></div>'
      }, 8000)
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
