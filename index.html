<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <script>
      ;(function () {
        var KEY = 'woontegra_chunk_reload_attempted'
        var BUST = '__v'

        function isChunkMessage(msg) {
          return /Failed to fetch dynamically imported module|dynamically imported module|Importing a module script failed|Loading chunk|ChunkLoadError|Unable to preload CSS|\/assets\/[^?\s"']+\.(js|css)/i.test(
            msg || '',
          )
        }

        function showUpdateScreen() {
          var root = document.getElementById('root')
          if (!root) return
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8fafc;padding:24px;font-family:system-ui,-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;">' +
            '<div style="max-width:28rem;border:1px solid #e2e8f0;border-radius:16px;background:#fff;padding:32px;text-align:center;box-shadow:0 1px 2px rgba(15,23,42,.06);">' +
            '<h1 style="margin:0;font-size:1.25rem;font-weight:700;color:#0f172a;">Site güncellendi</h1>' +
            '<p style="margin:12px 0 0;font-size:.875rem;line-height:1.6;color:#475569;">Woontegra\'nın yeni sürümü yayınlandı. Devam etmek için sayfayı yenileyin.</p>' +
            '<button type="button" onclick="window.location.reload()" style="margin-top:24px;border:0;border-radius:10px;background:#059669;color:#fff;padding:10px 16px;font-size:.875rem;font-weight:600;cursor:pointer;">Sayfayı yenile</button>' +
            '</div></div>'
        }

        function cacheBustReload() {
          try {
            if (sessionStorage.getItem(KEY) === '1') {
              showUpdateScreen()
              return
            }
            sessionStorage.setItem(KEY, '1')
          } catch (e) {
            /* ignore */
          }
          var url = new URL(window.location.href)
          url.searchParams.delete(BUST)
          url.searchParams.set(BUST, String(Date.now()))
          window.location.replace(url.toString())
        }

        window.addEventListener(
          'error',
          function (event) {
            var target = event.target
            if (target && target.tagName === 'SCRIPT' && target.src) {
              cacheBustReload()
              return
            }
            if (target && target.tagName === 'LINK' && target.rel === 'stylesheet' && target.href) {
              cacheBustReload()
              return
            }
            if (isChunkMessage(event.message || '')) cacheBustReload()
          },
          true,
        )

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event.reason
          var message =
            reason && reason.message ? String(reason.message) : reason == null ? '' : String(reason)
          if (isChunkMessage(message)) cacheBustReload()
        })
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Woontegra Teknoloji Yazılım ve Dijital Hizmetler Ltd. Şti.; işletmeler için özel yazılım, e-ticaret altyapısı, web sitesi, masaüstü yazılım ve dijital dönüşüm çözümleri geliştirir." />
    <link rel="canonical" href="https://www.woontegra.com/" />
    <title>Woontegra | Yazılım, E-Ticaret ve Dijital Dönüşüm Çözümleri</title>
  </head>
  <body>
    <div id="root">
      <div
        id="woontegra-boot"
        style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8fafc;color:#475569;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;"
      >
        Woontegra yükleniyor…
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
