<html lang="tr">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Woontegra Teknoloji Yazılım ve Dijital Hizmetler Ltd. Şti.; işletmeler için özel yazılım, e-ticaret altyapısı, web sitesi, masaüstü yazılım ve dijital dönüşüm çözümleri geliştirir." />
    <link rel="canonical" href="https://www.woontegra.com/" />
    <title>Woontegra | Yazılım, E-Ticaret ve Dijital Dönüşüm Çözümleri</title>

  <body>
    <div id="root"></div>
    <script>
      setTimeout(function () {
        if (window.__woontegraAppMounted) return
        var root = document.getElementById('root')
        if (!root || root.childElementCount > 0) return
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8fafc;padding:24px;font-family:system-ui,sans-serif;">' +
          '<div style="max-width:28rem;text-align:center;">' +
          '<h1 style="margin:0;font-size:1.125rem;font-weight:700;color:#0f172a;">Site yüklenirken hata oluştu</h1>' +
          '<p style="margin:12px 0 0;font-size:.875rem;color:#475569;">Lütfen sayfayı yenileyin. Sorun devam ederse tarayıcı önbelleğini temizleyin.</p>' +
          '<button type="button" onclick="window.location.reload()" style="margin-top:20px;border:0;border-radius:8px;background:#059669;color:#fff;padding:10px 16px;font-size:.875rem;cursor:pointer;">Sayfayı yenile</button>' +
          '</div></div>'
      }, 8000)
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
